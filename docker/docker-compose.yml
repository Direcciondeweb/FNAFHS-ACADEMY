version: '3.8'

services:
  # Base de datos MySQL
  mysql:
    image: mysql:8.0
    container_name: fnafhs-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-root123}
      MYSQL_DATABASE: ${DB_NAME:-fnafhs_db}
      MYSQL_USER: ${DB_USER:-fnafhs_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-fnafhs_pass}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ../database/schema.sql:/docker-entrypoint-initdb.d/1-schema.sql
      - ../database/data.sql:/docker-entrypoint-initdb.d/2-data.sql
    networks:
      - fnafhs-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  # Backend Spring Boot
  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: fnafhs-backend
    restart: unless-stopped
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/${DB_NAME:-fnafhs_db}?useSSL=false&serverTimezone=America/Lima&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: ${DB_USER:-root}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD:-root123}
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      FILE_UPLOAD_DIR: /app/uploads
      API_PERU_TOKEN: ${API_PERU_TOKEN:-}
    ports:
      - "8080:8080"
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - fnafhs-network

  # Adminer (Gestor de base de datos web)
  adminer:
    image: adminer:latest
    container_name: fnafhs-adminer
    restart: unless-stopped
    ports:
      - "8081:8080"
    environment:
      ADMINER_DEFAULT_SERVER: mysql
    depends_on:
      - mysql
    networks:
      - fnafhs-network

volumes:
  mysql_data:
  uploads_data:

networks:
  fnafhs-network:
    driver: bridge