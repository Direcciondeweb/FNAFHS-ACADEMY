# =============================================
# FNAFHS ACADEMY - SUPABASE CONFIGURATION
# =============================================

spring.application.name=FNAFHS-Academy

# Base de Datos Supabase (PostgreSQL)
spring.datasource.url=jdbc:postgresql://aws-0-us-east-1.pooler.supabase.com:5432/postgres
spring.datasource.username=postgres
spring.datasource.password=TU_CONTRASEÑA_AQUI
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA Configuration
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# Supabase Storage (para imágenes y videos)
supabase.url=https://TU_PROYECTO.supabase.co
supabase.key=TU_ANON_KEY_AQUI
supabase.storage.bucket=fnafhs-images

# Tipo de almacenamiento (supabase o local)
file.upload-type=supabase

# Multipart file upload
spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=100MB

# CORS para GitHub Pages
spring.web.cors.allowed-origins=https://TU_USUARIO.github.io,http://localhost:3000,http://localhost:8080
spring.web.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.web.cors.allowed-headers=*
spring.web.cors.allow-credentials=true

# Thymeleaf
spring.thymeleaf.cache=true

# Email Configuration (Gmail)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=TU_EMAIL@gmail.com
spring.mail.password=TU_CONTRASEÑA_APP
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

# Base URL para enlaces en emails
app.base-url=https://fnafhs-academy-backend.onrender.com

# Puerto
server.port=8080