# =============================================
# FNAFHS ACADEMY - CONFIGURACIÓN LOCAL (H2)
# =============================================

spring.application.name=FNAFHS-Academy

# Base de datos H2 (para pruebas locales)
spring.datasource.url=jdbc:h2:file:./data/fnafhs_db;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# H2 Console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Archivos (local)
file.upload-dir=./imagenes/
file.upload-type=local

# Multipart
spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=100MB

# Thymeleaf
spring.thymeleaf.cache=false

# Puerto
server.port=8080

# Email (configurar después)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=
spring.mail.password=
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true