# =============================================
# FNAFHS ACADEMY - PRODUCCIÓN (Supabase)
# =============================================

spring.application.name=FNAFHS-Academy

# Base de datos Supabase (PostgreSQL)
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/postgres}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# Supabase Storage
supabase.url=${SUPABASE_URL:}
supabase.key=${SUPABASE_KEY:}
supabase.storage.bucket=fnafhs-images

# Archivos (cloud)
file.upload-type=supabase

# Multipart
spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=100MB

# CORS para GitHub Pages
spring.web.cors.allowed-origins=${CORS_ORIGINS:https://tu-usuario.github.io,http://localhost:3000}
spring.web.cors.allowed-methods=*
spring.web.cors.allowed-headers=*
spring.web.cors.allow-credentials=true

# Thymeleaf
spring.thymeleaf.cache=true

# Email
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${EMAIL_USER:}
spring.mail.password=${EMAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Puerto
server.port=${PORT:8080}